  "useCases": [
    {"id":"UC-001","role":"Software Engineers","code":"SWE","name":"Write a feature specification before touching code","pain":"Vague requirements cause Claude to generate code that misses the real intent","habitId":"SH1","entry":"Claude Code CLI","prompt":"I need to build [feature name]. Before writing any code, help me write a complete specification. Include:\n1. Objective and user outcome\n2. Acceptance criteria (testable, precise)\n3. Data model changes needed\n4. Edge cases and error states\n5. Out of scope items\n\nContext: [paste existing codebase context or CLAUDE.md here]","inputs":"Feature request, existing codebase context","metric":"Spec writing time from 60 to 15 minutes; first-attempt code acceptance rises to 80%","guardrails":"Validate spec with stakeholders before passing to agent; never skip acceptance criteria","timeSaved":45,"priority":"High"},
    {"id":"UC-002","role":"QA Engineers","code":"QA","name":"Write test specification from requirements before any code exists","pain":"Tests written after code is built miss edge cases the spec would have caught","habitId":"SH1","entry":"Claude Code CLI","prompt":"Given these requirements: [paste requirements], write a complete test specification including:\n1. Test objectives per requirement\n2. Happy path test cases with expected outputs\n3. Edge cases and boundary conditions\n4. Negative test cases\n5. Data requirements per test\n\nFormat as BDD-style Given/When/Then where applicable.","inputs":"Requirements document or user story","metric":"Test coverage gaps caught before development begins; defect leakage reduced by 40%","guardrails":"Review with dev team before development starts; flag any ambiguous requirements","timeSaved":40,"priority":"High"},
    {"id":"UC-003","role":"Tech Leads & Architects","code":"TLA","name":"Draft an Architecture Decision Record (ADR) for a new system choice","pain":"Architecture decisions made verbally are forgotten or inconsistently applied by agents","habitId":"SH1","entry":"Claude Code CLI","prompt":"Help me write an Architecture Decision Record for: [decision, e.g. 'choosing PostgreSQL over MongoDB for our user data store'].\n\nStructure it with:\n1. Context and problem statement\n2. Decision drivers\n3. Considered options with pros/cons\n4. Decision and rationale\n5. Consequences and trade-offs\n6. Implementation guidance for the team\n\nThis ADR will be added to CLAUDE.md so agents follow this decision consistently.","inputs":"Decision context, options considered, constraints","metric":"ADR written in 20 mins vs 90 mins; agents consistently follow architectural decisions","guardrails":"Get sign-off from team lead before adding to CLAUDE.md; review quarterly for relevance","timeSaved":60,"priority":"High"},
    {"id":"UC-004","role":"Product & Planning","code":"PP","name":"Convert a user story into a Claude-executable engineering spec","pain":"User stories written for humans are too ambiguous for AI agents to act on reliably","habitId":"SH1","entry":"Claude.ai Web","prompt":"Convert this user story into a precise engineering specification that a Claude Code agent can execute without further clarification:\n\nUser Story: [paste user story]\n\nOutput format:\n1. Technical objective (one sentence)\n2. Inputs and outputs (precise data types)\n3. Acceptance criteria (each must be testable)\n4. Dependencies and APIs involved\n5. What explicitly NOT to build (scope boundary)\n\nFlag any ambiguity in the original story that needs product clarification.","inputs":"User story, product context","metric":"Engineering spec ambiguity questions reduced from 8 to 1 per story","guardrails":"Engineering team must validate spec before sprint commitment; product owner to resolve flagged ambiguities","timeSaved":30,"priority":"Medium"},
    {"id":"UC-005","role":"DevOps & Platform","code":"DP","name":"Write infrastructure provisioning spec before Terraform is touched","pain":"IaC written without a spec creates drift between environment intent and reality","habitId":"SH1","entry":"Claude Code CLI","prompt":"I need to provision [describe infrastructure, e.g. 'a highly available PostgreSQL RDS cluster with read replicas']. Before writing any Terraform, write a complete infrastructure spec:\n1. Resource inventory with sizing rationale\n2. Network topology and security group rules\n3. Backup and failover requirements\n4. Cost estimate per month\n5. Tagging and naming conventions\n6. Acceptance test criteria\n\nThis spec will be the source of truth for the Terraform agent.","inputs":"Infrastructure requirements, AWS/GCP/Azure account constraints","metric":"Terraform plan review cycles reduced from 5 to 1; infrastructure drift eliminated","guardrails":"Security team must approve before provisioning; cost estimate requires finance sign-off above $500/month","timeSaved":50,"priority":"High"},
    {"id":"UC-006","role":"Security Engineers","code":"SEC","name":"Write security requirements spec for a new feature before development starts","pain":"Security requirements added after build are expensive to retrofit and often incomplete","habitId":"SH1","entry":"Claude Code CLI","prompt":"I need to write security requirements for: [feature name and description].\n\nGenerate a security requirements specification covering:\n1. Authentication and authorisation requirements\n2. Data classification and handling rules\n3. Input validation and sanitisation requirements\n4. Logging and audit trail requirements\n5. Encryption requirements (at rest and in transit)\n6. Threat model: top 5 attack vectors and mitigations\n\nFormat as acceptance criteria the dev team can implement and QA can verify.","inputs":"Feature description, data types involved, regulatory context","metric":"Security defects found in production reduced by 60%; pen test findings drop significantly","guardrails":"Requirements must be reviewed by security lead before sprint; classify data types against company policy","timeSaved":55,"priority":"High"},
    {"id":"UC-007","role":"Software Engineers","code":"SWE","name":"Implement a feature using Claude Code with structured review checkpoints","pain":"Accepting AI-generated code without review leads to subtle bugs and security issues","habitId":"SH2","entry":"Claude Code CLI","prompt":"I want to implement [feature] from this spec: [paste spec].\n\nBefore you write any code:\n1. Confirm you understand the acceptance criteria\n2. List the files you plan to modify\n3. Describe your implementation approach\n\nWait for my approval before proceeding. After implementation, show me a diff summary before committing anything.","inputs":"Feature spec, codebase context via CLAUDE.md","metric":"First-attempt feature acceptance rate rises to 85%; review cycle from 3 rounds to 1","guardrails":"Never auto-commit; always review diff before accepting; run tests before marking complete","timeSaved":60,"priority":"High"},
    {"id":"UC-008","role":"QA Engineers","code":"QA","name":"Orchestrate a complete test generation session with coverage validation","pain":"Manually writing tests for every new feature is slow and inconsistently covers edge cases","habitId":"SH2","entry":"Claude Code CLI","prompt":"I need comprehensive tests for this code: [paste code or file path].\n\nStep 1: Analyse the code and list all testable behaviours before writing any tests.\nStep 2: Wait for my approval of the test plan.\nStep 3: Generate tests using [Jest/pytest/etc.].\nStep 4: Report coverage gaps and edge cases not covered.\n\nPrioritise: happy path, null/empty inputs, boundary values, error states.","inputs":"Code to test, testing framework, existing test patterns","metric":"Test writing time reduced from 3 hours to 40 minutes per feature","guardrails":"Review generated tests for logic correctness; never reduce existing coverage; validate mocks reflect real behaviour","timeSaved":50,"priority":"High"},
    {"id":"UC-009","role":"Tech Leads & Architects","code":"TLA","name":"Run an architectural impact analysis before approving a major change","pain":"Large refactors approved without impact analysis create unexpected downstream breakages","habitId":"SH2","entry":"Claude Code CLI","prompt":"Before we proceed with [proposed architectural change, e.g. 'migrating from REST to GraphQL for the user service'], I need an impact analysis.\n\nAnalyse our codebase and produce:\n1. All files and services affected\n2. Breaking changes for downstream consumers\n3. Migration effort estimate by component\n4. Risk areas ranked by severity\n5. Recommended implementation sequence\n6. Rollback strategy\n\n[Provide relevant file paths or CLAUDE.md context]","inputs":"Proposed change description, affected codebase context","metric":"Architectural surprises during implementation reduced by 70%","guardrails":"Impact analysis must be shared with all affected team leads before approval; add to CLAUDE.md after sign-off","timeSaved":75,"priority":"High"},
    {"id":"UC-010","role":"Product & Planning","code":"PP","name":"Validate a product spec for technical feasibility before sprint commitment","pain":"Product specs committed to sprint often contain technically infeasible requirements discovered mid-sprint","habitId":"SH5","entry":"Claude.ai Web","prompt":"Review this product specification for technical feasibility: [paste spec]\n\nAs a senior engineer reviewing this before sprint commitment, identify:\n1. Requirements that are technically ambiguous or impossible as written\n2. Hidden complexity or dependencies not mentioned in the spec\n3. Estimated complexity per acceptance criterion (S/M/L/XL)\n4. Questions that must be answered before development starts\n5. Suggestions to simplify without losing business value\n\nFlag anything that would cause mid-sprint blockers.","inputs":"Product spec, technical context","metric":"Mid-sprint blockers from spec issues reduced from 3 per sprint to 0","guardrails":"Feasibility review cannot replace technical lead sign-off; use as preparation for refinement session","timeSaved":35,"priority":"Medium"},
    {"id":"UC-011","role":"DevOps & Platform","code":"DP","name":"Orchestrate an infrastructure change with review gates at each stage","pain":"Unreviewed infrastructure changes applied directly cause outages and security gaps","habitId":"SH2","entry":"Claude Code CLI","prompt":"I need to [describe infrastructure change, e.g. 'upgrade our Kubernetes cluster from 1.27 to 1.29'].\n\nOrchestrate this change in stages:\nStage 1: Pre-change audit — list all affected resources and risks\nStage 2: Draft change plan — wait for my approval\nStage 3: Generate Terraform/kubectl commands — wait for my review\nStage 4: Apply to staging — wait for my green light\nStage 5: Validate staging — report results before touching production\n\nStop and wait for explicit approval at each stage.","inputs":"Change description, current infrastructure state","metric":"Change-related incidents reduced to zero; rollback time from 2 hours to 15 minutes","guardrails":"Never apply to production without staging validation; all changes require change ticket; rollback plan must exist before Stage 4","timeSaved":70,"priority":"High"},
    {"id":"UC-012","role":"Security Engineers","code":"SEC","name":"Run an agent-assisted security code review on a new pull request","pain":"Manual security review of every PR is slow and inconsistently applied across the team","habitId":"SH2","entry":"Claude Code CLI","prompt":"Review this pull request for security issues: [paste diff or file paths]\n\nAs a security engineer, check for:\n1. Injection vulnerabilities (SQL, command, LDAP)\n2. Broken authentication or authorisation patterns\n3. Sensitive data exposure (hardcoded secrets, PII in logs)\n4. Insecure direct object references\n5. Missing input validation\n6. Dependency vulnerabilities in any new packages added\n\nRate each finding: Critical / High / Medium / Low. Provide remediation code for Critical and High findings.","inputs":"PR diff or changed file contents","metric":"Security findings in production reduced by 55%; PR security review time from 45 to 10 minutes","guardrails":"Critical findings must block merge; agent findings require human security engineer verification for Critical/High","timeSaved":40,"priority":"High"},
    {"id":"UC-013","role":"Software Engineers","code":"SWE","name":"Deliver 3 features simultaneously using parallel Claude Code workspaces","pain":"Working on one feature at a time is the single biggest velocity bottleneck in AI-native development","habitId":"SH3","entry":"Claude Code CLI","prompt":"I'm going to run three Claude Code workspaces in parallel. For each feature, confirm you understand the spec and have everything needed to work independently:\n\nWorkspace 1 — Feature A: [paste spec]\nWorkspace 2 — Feature B: [paste spec]\nWorkspace 3 — Feature C: [paste spec]\n\nEach workspace must:\n- Work only in its designated files\n- Not modify shared files without flagging me first\n- Complete its spec independently and wait for review\n\nConfirm readiness for each workspace before I start them.","inputs":"3 independent feature specs, CLAUDE.md with shared context","metric":"Feature delivery velocity increases 3x; same week output that previously took 3 weeks","guardrails":"Use separate git branches per workspace; merge sequentially with CI passing; never let workspaces share file writes","timeSaved":120,"priority":"High"},
    {"id":"UC-014","role":"QA Engineers","code":"QA","name":"Generate test suites for multiple modules simultaneously","pain":"Sequential test generation for a large release takes days; parallel generation compresses this to hours","habitId":"SH3","entry":"Claude Code CLI","prompt":"I need to generate tests for [N] modules simultaneously. I'll run parallel Claude Code sessions.\n\nFor this session, focus ONLY on: [module name and file paths]\n\nGenerate:\n1. Unit tests for all public functions\n2. Integration tests for external dependencies\n3. Edge case tests for known failure modes\n4. Test data fixtures\n\nDo not touch or reference other modules. Report coverage percentage when complete.","inputs":"Module file paths, test framework, existing test patterns","metric":"Full regression suite build time from 3 days to 6 hours for a major release","guardrails":"Run each session in isolated environment; consolidate and check for conflicts before merging test suites","timeSaved":90,"priority":"Medium"},
    {"id":"UC-015","role":"Tech Leads & Architects","code":"TLA","name":"Run parallel codebase reviews across multiple system components","pain":"Reviewing a large codebase sequentially before a major release takes a week; parallel review takes a day","habitId":"SH3","entry":"Claude Code CLI","prompt":"This session reviews ONLY the [component name, e.g. 'authentication service'] component.\n\nConduct a thorough review covering:\n1. Code quality and consistency with our standards (see CLAUDE.md)\n2. Performance bottlenecks and N+1 queries\n3. Security vulnerabilities\n4. Test coverage gaps\n5. Documentation gaps\n6. Technical debt items ranked by severity\n\nOutput a structured report I can consolidate with parallel reviews of other components.","inputs":"Component file paths, CLAUDE.md with team standards","metric":"Pre-release code review time from 5 days to 1 day for a 10-component system","guardrails":"Each session scoped strictly to its component; consolidate reports before acting on findings","timeSaved":80,"priority":"Medium"},
    {"id":"UC-016","role":"Product & Planning","code":"PP","name":"Generate specs for multiple backlog items in parallel","pain":"Spec writing is a bottleneck when a product manager must write all specs sequentially","habitId":"SH3","entry":"Claude.ai Web","prompt":"Write a detailed engineering specification for this backlog item:\n\nTitle: [item title]\nDescription: [paste description]\nBusiness context: [why this matters]\n\nOutput:\n1. Technical objective\n2. Acceptance criteria (testable)\n3. Out of scope\n4. Technical questions requiring engineering input\n5. Estimated complexity: S/M/L\n\nNote: I am running this prompt for multiple backlog items simultaneously. Focus only on this item.","inputs":"Backlog item description, business context","metric":"Sprint planning prep time from 4 hours to 45 minutes; backlog spec coverage rises to 100%","guardrails":"Each spec needs engineering review before sprint commitment; don't merge specs that reference each other without cross-check","timeSaved":60,"priority":"Medium"},
    {"id":"UC-017","role":"DevOps & Platform","code":"DP","name":"Provision multiple environments in parallel for a new service launch","pain":"Sequential environment provisioning is a critical path bottleneck before every launch","habitId":"SH3","entry":"Claude Code CLI","prompt":"This agent session is responsible ONLY for provisioning the [dev/staging/prod] environment for [service name].\n\nUsing our existing Terraform modules in [repo path], provision:\n1. [List specific resources]\n2. Apply our standard tagging convention from CLAUDE.md\n3. Run validation checks after provisioning\n4. Report: resources created, cost estimate, any warnings\n\nDo not touch other environments or services.","inputs":"Terraform modules, environment config, CLAUDE.md with tagging standards","metric":"Environment provisioning from 3 days to 4 hours; zero config drift between environments","guardrails":"Each session isolated to its environment; production requires explicit human approval after staging validates; cost approval needed above threshold","timeSaved":85,"priority":"High"},
    {"id":"UC-018","role":"Security Engineers","code":"SEC","name":"Run parallel security scans across multiple repositories","pain":"Security scanning done sequentially across a multi-repo organisation takes days","habitId":"SH3","entry":"Claude Code CLI","prompt":"This session scans ONLY the [repository name] repository for security issues.\n\nConduct:\n1. Dependency vulnerability scan — list packages with CVEs\n2. Secrets detection — identify any hardcoded credentials or API keys\n3. OWASP Top 10 pattern check in application code\n4. Insecure configuration files (overly permissive IAM, open S3 buckets)\n5. Summary: Critical / High / Medium / Low findings\n\nOutput in a format I can consolidate with parallel scans of other repositories.","inputs":"Repository file paths, dependency manifests","metric":"Org-wide security scan from 5 days to 4 hours; findings actioned within 24 hours","guardrails":"Do not auto-remediate; output findings report only; Critical findings must be escalated immediately to security lead","timeSaved":70,"priority":"High"},
    {"id":"UC-019","role":"Software Engineers","code":"SWE","name":"Generate unit tests from spec before writing implementation code","pain":"Writing tests after implementation locks in the wrong behaviour and reduces refactorability","habitId":"SH4","entry":"Claude Code CLI","prompt":"I have a spec but no implementation yet. Generate unit tests first.\n\nSpec: [paste spec with acceptance criteria]\n\nGenerate tests that:\n1. Assert each acceptance criterion independently\n2. Test all defined edge cases\n3. Include appropriate mocks for external dependencies\n4. Will FAIL with no implementation (confirming they test real behaviour)\n\nUse [Jest/pytest/JUnit]. Output tests only — no implementation code.","inputs":"Feature specification with acceptance criteria","metric":"Defects caught before code review increases 3x; refactoring confidence improves significantly","guardrails":"Tests must fail before implementation; never write tests that trivially pass with empty functions","timeSaved":35,"priority":"High"},
    {"id":"UC-020","role":"QA Engineers","code":"QA","name":"Build a self-healing test suite that fixes itself when the codebase changes","pain":"Fragile tests that break on every refactor create test-suite maintenance overhead that kills QA velocity","habitId":"SH2","entry":"Claude Code CLI","prompt":"Our test suite has [N] broken tests after a recent refactor. I want to build a self-healing pattern.\n\nFor each broken test:\n1. Diagnose why it broke (interface change, not logic change vs. real regression)\n2. If it's a false failure from interface change: rewrite it to test behaviour, not implementation\n3. If it's a real regression: flag it as a bug to fix before rewriting\n4. Add a comment explaining what behaviour it protects\n\nAfter fixing, show me the pattern so we can apply it to future tests.","inputs":"Broken test files, recent code changes that caused failures","metric":"Test maintenance time reduced by 60%; false failure rate drops from 30% to under 5%","guardrails":"Never delete a failing test without understanding why it fails; real regressions must be escalated, not suppressed","timeSaved":55,"priority":"High"},
    {"id":"UC-021","role":"Tech Leads & Architects","code":"TLA","name":"Review an architecture spec for testability before development begins","pain":"Architectures designed without testability in mind are expensive to add tests to later","habitId":"SH4","entry":"Claude Code CLI","prompt":"Review this architecture spec for testability: [paste architecture spec or diagram description]\n\nAs a senior architect, assess:\n1. Which components are hard to unit test and why\n2. Integration points that will need contract tests\n3. Async flows that require special test patterns\n4. External dependencies that need mock/stub strategies\n5. Recommended changes to improve testability without compromising design\n6. Suggested test pyramid ratios for this architecture\n\nOutput recommendations the team can add to the spec before development.","inputs":"Architecture spec, system context","metric":"Test infrastructure setup time reduced by 50%; test coverage target achievable from day 1","guardrails":"Testability recommendations must not override core architecture requirements; get security sign-off on any mock strategies for sensitive systems","timeSaved":50,"priority":"Medium"},
    {"id":"UC-022","role":"Product & Planning","code":"PP","name":"Write user story acceptance criteria as executable test cases","pain":"Acceptance criteria written in plain English cannot be directly verified and are interpreted inconsistently","habitId":"SH4","entry":"Claude.ai Web","prompt":"Rewrite these acceptance criteria as executable test cases that QA can run without further clarification:\n\nOriginal acceptance criteria: [paste]\n\nFor each criterion, produce:\n- Test case ID\n- Given (preconditions)\n- When (actions)\n- Then (expected outcome, specific and measurable)\n- Test data required\n- Pass/Fail definition\n\nFlag any criterion that cannot be made measurable — these need product clarification.","inputs":"User story acceptance criteria","metric":"QA ambiguity questions per story from 5 to 0; acceptance rate on first demo improves","guardrails":"Product owner must validate that test cases correctly capture business intent before handoff to QA","timeSaved":25,"priority":"Medium"},
    {"id":"UC-023","role":"DevOps & Platform","code":"DP","name":"Test infrastructure-as-code correctness before applying to any environment","pain":"Terraform or Helm charts applied without validation cause environment failures and costly rollbacks","habitId":"SH4","entry":"Claude Code CLI","prompt":"Review this infrastructure code before I apply it to any environment: [paste Terraform/Helm/Kubernetes YAML]\n\nValidate:\n1. Syntax correctness\n2. Resource naming and tagging compliance (check CLAUDE.md for standards)\n3. Security misconfigurations (overly open security groups, missing encryption)\n4. Cost impact estimate vs. existing infrastructure\n5. Idempotency — is it safe to apply multiple times?\n6. Rollback procedure if apply fails\n\nOutput: PASS/FAIL per check with specific line references for failures.","inputs":"IaC files, CLAUDE.md with org standards","metric":"Failed infrastructure applies in staging reduced to zero; production incidents from IaC reduced by 80%","guardrails":"Never apply to production without passing all checks; security misconfigurations are automatic blockers","timeSaved":45,"priority":"High"},
    {"id":"UC-024","role":"Security Engineers","code":"SEC","name":"Generate security test cases from a threat model before development","pain":"Security testing added after build misses attack vectors that were visible in the design","habitId":"SH4","entry":"Claude Code CLI","prompt":"Based on this threat model, generate security test cases: [paste threat model or feature description with sensitive data flows]\n\nFor each identified threat:\n1. Write a concrete test case that would confirm the vulnerability exists (or is mitigated)\n2. Specify the attack payload or test input\n3. Define the expected secure behaviour\n4. Classify: Authentication / Authorisation / Injection / Data Exposure / Misconfiguration\n\nPrioritise by STRIDE category and business impact. Output in a format QA can execute.","inputs":"Threat model, feature spec, data flow diagrams","metric":"Security test coverage from 20% to 85% of identified threats; zero critical vulns found in pen test","guardrails":"Test cases involving real attack payloads must be run in isolated test environment only; never against production","timeSaved":60,"priority":"High"},
    {"id":"UC-025","role":"Software Engineers","code":"SWE","name":"Generate a full feature implementation then critically review before accepting","pain":"Developers accept AI-generated code without sufficient review, introducing subtle bugs and security issues","habitId":"SH5","entry":"Claude Code CLI","prompt":"Implement [feature] following this spec: [paste spec]\n\nAfter generating the implementation, BEFORE I review it, you critique your own output:\n1. Which parts of the spec might be incompletely implemented?\n2. What edge cases are not handled?\n3. Are there any performance concerns with this approach?\n4. Are there any security risks I should check?\n5. What would you do differently with more context?\n\nThen I'll review with your self-critique in mind.","inputs":"Feature spec, codebase context","metric":"Bugs found in code review falls by 50%; post-merge defect rate falls to near zero","guardrails":"Never skip self-critique step; always run tests before accepting; review changes to sensitive files (auth, payments) with another engineer","timeSaved":40,"priority":"High"},
    {"id":"UC-026","role":"QA Engineers","code":"QA","name":"Generate test data sets then validate they cover real-world failure scenarios","pain":"AI-generated test data is often idealised and misses the messy real-world inputs that expose bugs","habitId":"SH5","entry":"Claude Code CLI","prompt":"Generate test data for: [describe data type and use case, e.g. 'user registration with international addresses']\n\nFirst, generate 20 test records covering:\n- Standard happy path cases\n- Boundary values (max/min lengths, special characters)\n- Internationalisation edge cases\n- Null and empty values\n- Injection attempt strings (SQLi, XSS)\n\nThen, audit your own test data:\n- Which real-world failure patterns are missing?\n- What would a malicious user send that's not covered?\n- What data would expose a timezone or encoding bug?","inputs":"Data schema, field constraints, business rules","metric":"Bugs found in user acceptance testing drops by 45%; test data preparation time from 3 hours to 30 minutes","guardrails":"Never use real PII in test data; injection test strings must only be used in isolated test environments","timeSaved":45,"priority":"Medium"},
    {"id":"UC-027","role":"Tech Leads & Architects","code":"TLA","name":"Generate multiple architecture options then evaluate trade-offs before deciding","pain":"Architecture decisions made on the first viable option miss better alternatives that emerge from systematic comparison","habitId":"SH5","entry":"Claude Code CLI","prompt":"I need to decide how to [architectural decision, e.g. 'handle real-time notifications in our system'].\n\nGenerate 3 distinct architectural options. For each option:\n1. Architecture description with diagram description\n2. Key components and technologies\n3. Pros and cons for our context: [describe team size, scale, existing stack]\n4. Implementation effort: weeks\n5. Operational complexity long-term\n\nAfter generating all three, give me your recommended option with clear reasoning. I will then decide.","inputs":"Problem statement, team context, existing stack, constraints","metric":"Architecture decision quality improves; regret decisions (reversed within 6 months) drop to near zero","guardrails":"Final decision must be made by human architect, not accepted from agent automatically; document decision in ADR","timeSaved":70,"priority":"High"},
    {"id":"UC-028","role":"Product & Planning","code":"PP","name":"Draft a feature roadmap then validate against technical and business constraints","pain":"Roadmaps drafted without constraint validation create commitments that engineering cannot honour","habitId":"SH5","entry":"Claude.ai Web","prompt":"Draft a 3-month feature roadmap for [product area] based on these priorities: [paste priorities]\n\nAfter drafting, critically assess your own roadmap:\n1. Which items have hidden technical dependencies not in the draft?\n2. What assumptions about team velocity might be wrong?\n3. Which items conflict with each other if done in the proposed sequence?\n4. What would slip first if the team is 20% slower than planned?\n5. What's missing that stakeholders will ask about?\n\nI will use your critique to refine the draft before sharing with stakeholders.","inputs":"Product priorities, team capacity, technical context","metric":"Roadmap revision cycles from 4 to 1; sprint spillover from roadmap commitments drops by 60%","guardrails":"Roadmap must be validated by engineering lead before stakeholder presentation; never commit dates from AI draft without engineering confirmation","timeSaved":40,"priority":"Medium"},
    {"id":"UC-029","role":"DevOps & Platform","code":"DP","name":"Generate CI/CD pipeline configuration then audit for security and reliability","pain":"Pipeline configurations written quickly contain security gaps and reliability issues that cause incidents","habitId":"SH5","entry":"Claude Code CLI","prompt":"Generate a CI/CD pipeline for [service name and stack] that implements:\n[list requirements: test stages, deployment environments, approval gates]\n\nAfter generating, audit your own pipeline for:\n1. Secrets handling — are credentials properly managed?\n2. Blast radius — could a pipeline failure take down production?\n3. Missing approval gates for production deployments\n4. Test coverage gaps in the build stage\n5. Performance — estimated build time and opportunities to parallelise\n6. What would cause this pipeline to produce a false green build?\n\nRevise the pipeline based on your own audit before presenting it.","inputs":"Service tech stack, deployment environments, existing secrets management","metric":"Pipeline-related incidents in first 3 months drops from an average of 4 to 0","guardrails":"Production deployment gates require human approval; secrets must use vault/secrets manager, never hardcoded","timeSaved":55,"priority":"High"},
    {"id":"UC-030","role":"Security Engineers","code":"SEC","name":"Draft a security policy document then run a self-audit for gaps and compliance","pain":"Security policies drafted quickly miss regulatory requirements and create a false sense of coverage","habitId":"SH5","entry":"Claude Code CLI","prompt":"Draft a [policy type, e.g. 'API security policy'] for our engineering team.\n\nAfter drafting, audit your own policy against:\n1. OWASP API Security Top 10 — is each item addressed?\n2. Our regulatory requirements: [list applicable: GDPR, SOC2, ISO27001]\n3. Gaps — what attack vectors does this policy not cover?\n4. Enforceability — which policies are aspirational vs. technically enforceable?\n5. Conflict with existing policies: [list related policies]\n\nRevise the policy based on your own audit. Flag items requiring legal or compliance review.","inputs":"Policy scope, regulatory requirements, existing security policies","metric":"External audit findings related to policy gaps reduced by 70%; policy review cycle from 3 weeks to 3 days","guardrails":"All policies require security lead and legal sign-off before publication; do not publish AI-drafted policy without human review","timeSaved":50,"priority":"Medium"},
    {"id":"UC-031","role":"Software Engineers","code":"SWE","name":"Build a team CLAUDE.md that makes every agent interaction consistent and fast","pain":"Every engineer has different conventions; Claude agents produce inconsistent code because they have no shared context","habitId":"SH6","entry":"Claude Code CLI","prompt":"Help me build a comprehensive CLAUDE.md for our engineering team.\n\nInterview me about our standards — ask me questions about:\n1. Our language versions and frameworks\n2. Code style and naming conventions\n3. Testing patterns and coverage requirements\n4. Git workflow (branch naming, commit format, PR process)\n5. Architecture decisions that all code must follow\n6. What Claude should NEVER do (e.g. use deprecated APIs, skip tests)\n\nAsk one category at a time. After all categories, generate the complete CLAUDE.md.","inputs":"Team conventions discussion","metric":"Agent output quality improves immediately; onboarding time for new agents reduced to minutes","guardrails":"CLAUDE.md must be reviewed and approved by tech lead before committing; review quarterly for drift","timeSaved":60,"priority":"High"},
    {"id":"UC-032","role":"QA Engineers","code":"QA","name":"Create an Agent Skill that automates your team's most repeated test patterns","pain":"Repeated test boilerplate is written from scratch every sprint; institutional knowledge of good test patterns is not shared","habitId":"SH6","entry":"Claude Code CLI","prompt":"I want to create a SKILL.md Agent Skill for our most common test pattern: [describe pattern, e.g. 'API integration tests with auth headers and JSON schema validation'].\n\nHelp me:\n1. Extract the repeatable pattern from this example test: [paste example]\n2. Identify all the parameters that change per use case\n3. Write the SKILL.md with clear usage instructions for the team\n4. Create 2 example invocations showing the skill in action\n5. Write the quality gates the skill should enforce automatically\n\nThis skill should make any engineer able to generate a correct test in under 2 minutes.","inputs":"Example test file, test framework, team standards","metric":"Test boilerplate writing time from 20 minutes to 2 minutes; test pattern consistency across team rises to 95%","guardrails":"Skill must be reviewed by QA lead before adding to repo; test it on 3 real test cases before sharing with team","timeSaved":55,"priority":"Medium"},
    {"id":"UC-033","role":"Tech Leads & Architects","code":"TLA","name":"Document system architecture in CLAUDE.md so every agent inherits it instantly","pain":"New agents and engineers lack architectural context — they make decisions that contradict established patterns","habitId":"SH6","entry":"Claude Code CLI","prompt":"Help me encode our system architecture into CLAUDE.md so every agent session starts with full context.\n\nInterview me about our architecture:\n1. What are the main system components and their responsibilities?\n2. What are the key data flows and integration points?\n3. What architectural patterns must all new code follow?\n4. What are the known constraints (performance, compliance, legacy)?\n5. What architectural decisions must never be reversed?\n6. What should agents ask a human before making architectural changes?\n\nGenerate the architecture section of CLAUDE.md after the interview.","inputs":"Architecture knowledge discussion","metric":"Architecture compliance in agent-generated code rises to 95%; arch review rejection rate drops to near zero","guardrails":"Architecture section requires CTO/senior architect sign-off; review when major components change","timeSaved":80,"priority":"High"},
    {"id":"UC-034","role":"Product & Planning","code":"PP","name":"Encode product specification templates as Agent Skills for the engineering team","pain":"Every spec is formatted differently; engineers waste time reformatting before they can act on specs","habitId":"SH6","entry":"Claude Code CLI","prompt":"Create a SKILL.md Agent Skill that generates a complete product specification from a brief.\n\nBased on this example spec that worked well: [paste example], create a skill that:\n1. Defines the inputs needed (one paragraph brief)\n2. Produces: objective, acceptance criteria, out of scope, complexity estimate, open questions\n3. Flags common missing information automatically\n4. Is formatted so Claude Code agents can execute it directly\n\nWrite the SKILL.md with usage instructions any product manager can follow.","inputs":"Example spec, spec format requirements","metric":"Spec writing time from 90 minutes to 15 minutes; engineering ambiguity questions per spec drop from 6 to 1","guardrails":"Skill output is a draft that requires product owner review; don't skip the 'open questions' section","timeSaved":45,"priority":"Medium"},
    {"id":"UC-035","role":"DevOps & Platform","code":"DP","name":"Build a deployment runbook as an Agent Skill for zero-defect releases","pain":"Deployment runbooks are stale, inconsistently followed, and take a senior engineer to execute safely","habitId":"SH6","entry":"Claude Code CLI","prompt":"Help me encode our deployment process as a SKILL.md Agent Skill.\n\nDocument our deployment for [service name]:\n1. Pre-deployment checklist (tests passing, approvals, rollback ready)\n2. Step-by-step deployment sequence with validation at each step\n3. Health checks and success criteria after each environment\n4. Rollback trigger conditions and procedure\n5. Post-deployment monitoring period and sign-off criteria\n\nMake this skill executable by any on-call engineer, regardless of service familiarity. Include explicit 'STOP and call [role]' instructions for ambiguous situations.","inputs":"Current runbook (if exists), deployment architecture, monitoring setup","metric":"Deployment incidents from human error reduced to zero; junior engineer can safely deploy independently","guardrails":"Runbook must be validated by running it in staging with a junior engineer before production use; update after every incident","timeSaved":65,"priority":"High"},
    {"id":"UC-036","role":"Security Engineers","code":"SEC","name":"Encode the security checklist in CLAUDE.md so agents enforce it automatically","pain":"Security requirements are documented in a wiki nobody reads; agents produce insecure code because they have no security context","habitId":"SH6","entry":"Claude Code CLI","prompt":"Help me add a security standards section to our CLAUDE.md.\n\nInterview me about our security requirements:\n1. Authentication patterns we always use\n2. How we handle secrets and credentials\n3. Input validation standards\n4. Logging rules (what to log, what never to log)\n5. Dependency approval process\n6. What should Claude refuse to implement without security review?\n\nGenerate the SECURITY section of CLAUDE.md that agents will follow in every session.","inputs":"Security policies, compliance requirements, known vulnerabilities to prevent","metric":"Security antipatterns in agent-generated code drops to near zero; security review rejection rate falls by 75%","guardrails":"Security section requires CISO/security lead approval; must be tested against recent security findings before merging","timeSaved":50,"priority":"High"},
    {"id":"UC-037","role":"Software Engineers","code":"SWE","name":"Define an overnight feature generation run and review results in the morning","pain":"Engineering compute sits idle overnight; features that could be generated and PR'd while engineers sleep are not","habitId":"SH7","entry":"Claude Code CLI","prompt":"Set up tonight's AI Night Shift for me.\n\nI'll queue these 3 tasks for overnight execution:\nTask 1: [feature/refactor description with spec]\nTask 2: [feature/refactor description with spec]\nTask 3: [bug fix with reproduction steps]\n\nFor each task:\n1. Confirm you understand the task and have everything needed\n2. Define the success criteria and the expected output (PR, file changes, test results)\n3. List any ambiguities that would cause you to stop and wait\n\nI will review results at 9am. Confirm the queue is ready.","inputs":"Task specs, CLAUDE.md with team standards","metric":"Feature velocity doubles; engineering day extends beyond working hours with zero overtime","guardrails":"Night Shift runs must have clear stop conditions; never merge overnight PRs without morning review; tasks involving production data must be explicitly approved","timeSaved":120,"priority":"High"},
    {"id":"UC-038","role":"QA Engineers","code":"QA","name":"Run overnight regression suite and wake up to a triage-ready report","pain":"Long regression suites block daytime engineering; results need manual triage which delays the morning","habitId":"SH7","entry":"Claude Code CLI","prompt":"Set up an overnight regression run and prepare me a triage-ready morning report.\n\nTonight:\n1. Run the full regression suite against [branch/environment]\n2. Categorise any failures: new regression vs. pre-existing vs. environment flakiness\n3. For new regressions, identify the commit that introduced the failure\n4. Draft a one-paragraph summary per failing test with likely root cause\n5. Prioritise the triage list: what must be fixed before the next release, what can wait\n\nOutput a report I can action in the first 30 minutes of my morning.","inputs":"Test suite, target branch, known flaky tests list","metric":"Morning triage time from 90 minutes to 15 minutes; regression blockers identified before standup","guardrails":"Overnight run is in isolated test environment; never restart or rerun production services; flaky test threshold must be tuned before enabling auto-triage","timeSaved":90,"priority":"Medium"},
    {"id":"UC-039","role":"Tech Leads & Architects","code":"TLA","name":"Run overnight dependency audit and wake up to upgrade proposals","pain":"Outdated dependencies accumulate silently; manual audits are deferred indefinitely; CVEs go unpatched for months","habitId":"SH7","entry":"Claude Code CLI","prompt":"Run a dependency audit overnight and prepare upgrade proposals for my morning review.\n\nAudit our [repo/service] dependencies and:\n1. List all packages with known CVEs — severity and CVSS score\n2. Flag packages more than 2 major versions behind latest stable\n3. Identify deprecated packages with no migration path\n4. For each Critical/High CVE: generate the upgrade PR description and breaking change risk assessment\n5. Estimate total upgrade effort: hours per package\n\nOutput: prioritised action list + draft PRs for Critical CVE fixes ready for my review.","inputs":"Package manifests (package.json, requirements.txt, pom.xml etc.)","metric":"Mean time to patch Critical CVEs from 45 days to 3 days; technical debt audit from 2 weeks to overnight","guardrails":"Never auto-merge upgrade PRs; breaking changes require manual testing before approval; CVE severity must be validated against actual usage patterns","timeSaved":85,"priority":"High"},
    {"id":"UC-040","role":"Product & Planning","code":"PP","name":"Run overnight backlog grooming and wake up to prioritised sprint candidates","pain":"Manual backlog grooming in planning meetings consumes 2 hours per sprint that could be async","habitId":"SH7","entry":"Claude Code CLI","prompt":"Review our backlog and prepare prioritised sprint candidates for tomorrow's planning session.\n\nFrom this backlog: [paste backlog items or export]\n\nFor each item:\n1. Score against our stated priorities: [list priorities]\n2. Identify missing information that would block a sprint commitment\n3. Flag dependencies on other items or teams\n4. Estimate complexity: S/M/L based on description\n5. Group items into a proposed sprint that fits [X] story points\n\nOutput: proposed sprint with rationale, items needing clarification, dependency map.","inputs":"Product backlog, sprint capacity, strategic priorities","metric":"Sprint planning session from 2 hours to 30 minutes; planning accuracy (no mid-sprint surprises) improves","guardrails":"AI-proposed sprint is a starting point for discussion; final sprint commitment requires team agreement; never commit to items without addressing flagged missing information","timeSaved":60,"priority":"Medium"},
    {"id":"UC-041","role":"DevOps & Platform","code":"DP","name":"Run overnight infrastructure health checks and wake up to an ops briefing","pain":"Infrastructure issues discovered mid-day disrupt engineering; proactive overnight monitoring prevents morning surprises","habitId":"SH7","entry":"Claude Code CLI","prompt":"Run an overnight infrastructure health check and prepare an ops briefing for my 9am.\n\nCheck across our environments:\n1. Resource utilisation trending toward capacity limits (CPU, memory, disk, network)\n2. Cost anomalies — any services with unusual spend vs. last week\n3. Certificate expiries in the next 30 days\n4. Backup job success rates for the past 7 days\n5. Unacknowledged alerts from the past 24 hours\n\nOutput: traffic light summary (Red/Amber/Green per category) + action list with urgency ranking.","inputs":"Monitoring system access, cost management tool, backup logs","metric":"P1 incidents from undetected infrastructure issues reduced by 80%; morning standup covers ops status in 5 minutes","guardrails":"Health checks are read-only; never remediate automatically; Red items require on-call engineer notification before business hours","timeSaved":75,"priority":"High"},
    {"id":"UC-042","role":"Security Engineers","code":"SEC","name":"Run overnight vulnerability scanning and wake up to a remediation plan","pain":"Vulnerability scans run manually are deferred; new CVEs can be in production for weeks before detection","habitId":"SH7","entry":"Claude Code CLI","prompt":"Run a vulnerability scan overnight and prepare a remediation plan for my morning review.\n\nScan our production codebase and containers for:\n1. New CVEs published in the last 7 days affecting our stack\n2. Container image vulnerabilities (run Trivy or equivalent)\n3. Exposed secrets or credentials in recent commits\n4. Misconfigured cloud resources (public S3, open security groups)\n\nFor each Critical finding:\n- Assess actual exploitability in our context\n- Draft the remediation action (patch version, config change, or code fix)\n- Estimate effort to fix: hours\n\nOutput: triage-ready report ordered by risk x exploitability.","inputs":"Repository access, container registry, cloud environment scan permissions","metric":"Mean time to detect critical vulnerabilities from 30 days to overnight; zero unpatched Criticals older than 72 hours","guardrails":"Scanning tools must be approved security tooling only; scan results are confidential; findings must not be logged to shared channels; never auto-apply remediations","timeSaved":90,"priority":"High"}

// Load profile from active company (server) or localStorage, then rebuild DATA
(function applyProfileToUseCases() {

  function applyProfile(profData, clientInfo) {
    if (!profData) return;

    var useCases;
    var roles;

    if (profData.useCases && profData.useCases.length) {
      // Use pre-generated use cases from research step
      useCases = profData.useCases;
      roles = (profData.capabilities || []).slice(0, 6);
    } else {
      return;
    }
    var needsSave = false;

    var roleNames = {}, roleIcons = {};
    roles.forEach(function(r, i) {
      roleNames[r.short] = r.role;
      roleIcons[r.short] = PROFILE_ROLE_ICONS[i % PROFILE_ROLE_ICONS.length];
    });

    var aggs = buildAggregates_YS(useCases);
    DATA.useCases = useCases;
    DATA.roleNames = roleNames;
    DATA.roleIcons = roleIcons;
    DATA.claude.byRole = aggs.byRole;
    DATA.claude.byHabit = aggs.byHabit;
    DATA.claude.totals = aggs.totals;
    DATA.claude.roleHabitMatrix = aggs.roleHabitMatrix;
    if (clientInfo) {
      DATA.client = { name: clientInfo.name || DATA.client.name, tagline: clientInfo.tagline || DATA.client.tagline };
    }

    var nameEl = document.querySelector('[data-company-name]');
    if (nameEl) nameEl.textContent = (clientInfo && (clientInfo.shortName || clientInfo.name)) || nameEl.textContent;

    var badges = document.querySelectorAll('.nav-badge');
    if (badges[1]) badges[1].textContent = roles.length;
    if (badges[2]) badges[2].textContent = useCases.length;

    render(); // re-render with company-specific data
  }

  function tryLocalStorage() {
    try {
      var profileStr = localStorage.getItem('ys_profile');
      if (!profileStr) return;
      var prof = JSON.parse(profileStr);
      applyProfile(prof, prof.client);
    } catch(e) {}
  }

  // 1. Try active company from sessionStorage → fetch from server
  var activeCompany = null;
  try { activeCompany = JSON.parse(sessionStorage.getItem('active_company') || 'null'); } catch(e) {}

  if (activeCompany && activeCompany.id) {
    fetch('http://localhost:3001/profile?id=' + encodeURIComponent(activeCompany.id))
      .then(function(res) { return res.json(); })
      .then(function(profile) {
        if (profile && profile.data && profile.data.useCases && profile.data.useCases.length) {
          applyProfile(profile.data, profile.data.client);
        } else {
          tryLocalStorage();
        }
      })
      .catch(function() {
        // Server not running — fetch profile JSON directly (Vercel static hosting)
        fetch('profiles/index.json')
          .then(function(r) { return r.json(); })
          .then(function(idx) {
            // Find a profile matching this company name that has use cases
            var companyName = (activeCompany.name || '').toLowerCase();
            var match = (idx.profiles || []).find(function(p) {
              return p.name && p.name.toLowerCase() === companyName && !p.config;
            });
            if (!match) { tryLocalStorage(); return; }
            return fetch('profiles/' + match.id + '.json')
              .then(function(r) { return r.json(); })
              .then(function(p) {
                if (p && p.data && p.data.useCases && p.data.useCases.length) {
                  applyProfile(p.data, p.data.client);
                } else {
                  tryLocalStorage();
                }
              });
          })
          .catch(tryLocalStorage);
      });
  } else {
    // No active company — fall back to localStorage (NTUC default)
    tryLocalStorage();
  }
})();

  return DATA.claude.habits.find(h => h.id === habitId) || {id: habitId, name: habitId, color: 'var(--color-primary)'};

function getCurrentUseCases() {
  return [...DATA.useCases].sort((a, b) => {
    const aNum = parseInt(a.habitId.replace(/[^0-9]/g, ''));
    const bNum = parseInt(b.habitId.replace(/[^0-9]/g, ''));
    return aNum - bNum;
  });
}

function getFilteredUseCases() {
  let uc = getCurrentUseCases();
  if (filters.role !== 'all') uc = uc.filter(u => u.code === filters.role);
  if (filters.habit !== 'all') uc = uc.filter(u => u.habitId === filters.habit);
  if (filters.priority !== 'all') uc = uc.filter(u => u.priority.toLowerCase() === filters.priority);
  if (filters.entry !== 'all') uc = uc.filter(u => u.entry === filters.entry);
  if (searchTerm && searchTerm.length >= 2) {
    const term = searchTerm.toLowerCase();
    uc = uc.filter(u => u.name.toLowerCase().includes(term) || u.pain.toLowerCase().includes(term) || u.prompt.toLowerCase().includes(term) || u.role.toLowerCase().includes(term));
  }
  return uc;
}

function highlightText(text, term) {
  if (!term || term.length < 2) return text;
  try {
    const regex = new RegExp('(' + term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
    return text.replace(regex, '<span class="search-highlight">$1</span>');
  } catch(e) { return text; }
}

  const byRole = getCurrentByRole();
  
  let roleCards = byRole.map(r => '<div class="role-card" onclick="filters.role=\'' + r.code + '\';navigateTo(\'usecases\')"><div class="role-card-header"><div class="role-icon brand">' + (DATA.roleIcons[r.code] || '') + '</div><div class="role-info"><div class="role-name">' + r.role + '</div><div class="role-code">' + r.code + '</div></div></div><div class="role-metrics"><div class="role-metric"><div class="role-metric-value">' + r.useCases + '</div><div class="role-metric-label">Use Cases</div></div><div class="role-metric"><div class="role-metric-value">' + r.highPriority + '</div><div class="role-metric-label">High Priority</div></div><div class="role-metric"><div class="role-metric-value">' + r.timeSaved + '</div><div class="role-metric-label">Min/Week</div></div></div><div class="role-tags">' + r.topHabits.map(h => '<span class="role-tag chat">' + h + '</span>').join('') + '</div></div>').join('');
  
  return '<div class="section-header"><div class="section-title-group"><div class="section-title">Explore by Engineering Role</div><div class="section-subtitle">Find use cases relevant to your role — click any card to filter the Use Case Bank</div></div></div><div class="cards-grid">' + roleCards + '</div>';
}
function renderUseCases() {
  const byHabit = getCurrentByHabit();
  const total = getCurrentUseCases().length;

  let viewAllTab = '<div class="uc-tab-all' + (filters.habit === 'all' ? ' active' : '') + '" onclick="selectHabitTab(\'all\')"><div class="uc-tab-all-icon"><svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div><span>View All</span></div>';

  let habitTabs = byHabit.map(bh => {
    const habit = getHabit(bh.id);
    const isActive = filters.habit === bh.id;
    return '<div class="uc-tab' + (isActive ? ' active' : '') + '" onclick="selectHabitTab(\'' + bh.id + '\')"><div class="uc-tab-id">' + bh.id + '</div><div class="uc-tab-info"><div class="uc-tab-name">' + habit.name + '</div><div class="uc-tab-action">' + habit.action + '</div></div></div>';
  }).join('');

  let sidebar = '<div class="uc-sidebar">' + viewAllTab +
    '<div class="uc-sidebar-divider"></div><div class="uc-sidebar-label">BY HABIT</div>' +
    habitTabs + '</div>';

  let detail = '<div class="uc-detail">' + renderDetailPanel() + '</div>';

  var entryLabel = entryType === 'cli' ? 'Claude Code CLI' : (entryType === 'web' ? 'Claude.ai Web' : 'all');
  var filteredTotal = entryType === 'all' ? total : DATA.useCases.filter(function(u){return u.entry===(entryType==='cli'?'Claude Code CLI':'Claude.ai Web');}).length;
  return '<div class="section-header"><div class="section-title-group"><div class="section-title">Use Case Bank</div>' +
    '<div class="section-subtitle">' + filteredTotal + ' use cases with copy-ready prompts — organised by the 7 New Habits</div></div>' +
    renderEntryToggle() + '</div>' +
    '<div class="uc-layout">' + sidebar + detail + '</div>';
}
function renderDetailPanel() {
  const isAll = filters.habit === 'all';
  let titleHtml = '';
  if (isAll) {
    titleHtml = '<div class="uc-detail-title"><div class="uc-detail-badge"><svg viewBox="0 0 24 24" style="width:14px;height:14px;fill:white"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg></div>' +
      '<div><div class="uc-detail-name">All Use Cases</div><div class="uc-detail-desc">Browse the complete collection</div></div></div>';
  } else {
    const habit = getHabit(filters.habit);
    titleHtml = '<div class="uc-detail-title"><div class="uc-detail-badge">' + filters.habit + '</div>' +
      '<div><div class="uc-detail-name">' + habit.name + '</div><div class="uc-detail-desc">' + habit.action + '</div></div></div>';
  }

  let roleOptions = Object.keys(DATA.roleNames).map(code => '<option value="' + code + '"' + (filters.role === code ? ' selected' : '') + '>' + DATA.roleNames[code] + '</option>').join('');
  let filtersHtml = '<div class="uc-detail-filters">' +
    '<select class="uc-mini-filter" onchange="setFilter(\'role\',this.value)"><option value="all">All Roles</option>' + roleOptions + '</select>' +
    '<select class="uc-mini-filter" onchange="setFilter(\'priority\',this.value)"><option value="all">All Priorities</option><option value="high"' + (filters.priority === 'high' ? ' selected' : '') + '>High</option><option value="medium"' + (filters.priority === 'medium' ? ' selected' : '') + '>Medium</option></select>' +
    '<div class="uc-mini-search"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>' +
    '<input type="text" id="search-input" placeholder="Search prompts..." value="' + searchTerm + '" oninput="setSearch(this.value)"></div></div>';

  return '<div class="uc-detail-header">' + titleHtml + filtersHtml + '</div><div id="uc-results-area">' + renderUseCaseCardsContent() + '</div>';
}
function selectHabitTab(habitId) {
  if (habitId === 'all') {
    filters.habit = 'all';
    filters.role = 'all';
    filters.priority = 'all';
    searchTerm = '';
  } else {
    filters.habit = habitId;
    searchTerm = '';
  }
  render();
}
function renderUseCaseResults() {
  const detail = document.querySelector('.uc-detail');
  if (detail) detail.innerHTML = renderDetailPanel();
}

function renderUseCaseCardsContent() {
  const useCases = getFilteredUseCases();
  const total = getCurrentUseCases().length;
  const habitLabel = filters.habit !== 'all' ? getHabit(filters.habit).name : '';

  let countText = 'Showing <strong>' + useCases.length + '</strong> of <strong>' + total + '</strong> use cases';
  if (habitLabel) countText += ' in <strong>' + habitLabel + '</strong>';
  if (searchTerm) countText += ' matching "<strong>' + searchTerm + '</strong>"';

  if (useCases.length === 0) {
    return '<div class="uc-results-bar">' + countText + '</div><div class="uc-card-list" style="display:flex;align-items:center;justify-content:center;padding:60px 20px;text-align:center"><div><svg viewBox="0 0 24 24" style="width:48px;height:48px;fill:var(--text-muted);margin-bottom:12px"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><div style="color:var(--text-muted);font-size:14px">No use cases found</div><div style="color:var(--text-muted);font-size:12px;margin-top:4px">Try adjusting your filters or search</div></div></div>';
  }

  return '<div class="uc-results-bar">' + countText + '</div><div class="uc-card-list">' + useCases.map(uc => renderUseCaseCard(uc)).join('') + '</div>';
}
function renderUseCaseResultsContent() {
  return renderUseCaseCardsContent();
}

function renderUseCaseCard(uc) {
  const habit = getHabit(uc.habitId);
  
  return '<div class="usecase-card" onclick="toggleUseCase(this)"><div class="usecase-header"><div class="usecase-top"><div class="usecase-habit-badge" style="background:' + habit.color + '">' + uc.habitId + '</div><div><div class="usecase-title">' + highlightText(uc.name, searchTerm) + '</div><div class="usecase-meta">' + highlightText(uc.role, searchTerm) + ' &bull; ' + habit.name + '</div></div></div><div class="usecase-tags"><span class="usecase-tag priority-' + uc.priority.toLowerCase() + '">' + uc.priority + '</span><span class="usecase-tag copilot-chat">Claude Code</span><span class="usecase-tag time-saved">' + uc.timeSaved + ' min/wk</span></div><div class="usecase-pain">' + highlightText(uc.pain, searchTerm) + '</div></div><div class="usecase-details"><div class="usecase-section"><div class="usecase-label">Starter Prompt</div><div class="prompt-box"><button class="copy-btn" onclick="copyPrompt(this,event)"><svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy</button><div class="prompt-text">' + uc.prompt + '</div></div></div><div class="usecase-section"><div class="usecase-label">Required Inputs</div><p style="font-size:13px;color:var(--text-secondary)">' + uc.inputs + '</p></div><div class="usecase-section"><div class="usecase-label">Success Metric</div><p style="font-size:13px;color:var(--brand-primary-dark);font-weight:500">' + uc.metric + '</p></div><div class="usecase-section" style="background:rgba(245,158,11,0.1);padding:12px;border-radius:var(--radius-sm);margin-top:16px"><div class="usecase-label" style="color:var(--warning)">Guardrails</div><p style="font-size:12px;color:var(--text-secondary)">' + uc.guardrails + '</p></div></div><div class="usecase-footer"><span style="font-size:12px;color:var(--text-muted)">' + uc.id + ' &bull; ' + uc.entry + '</span><button class="expand-btn">View Details<svg viewBox="0 0 24 24"><path d="M16.59 8.59L12 13.17 7.41 8.59 6 10l6 6 6-6z"/></svg></button></div></div>';
}
render();
</script>
</body></html>
